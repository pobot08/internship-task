services:
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: generator_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  service1:
    build:
      context: ./Service1.Generator
      dockerfile: Dockerfile
    container_name: service1
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=generator_db;Username=postgres;Password=postgres
      - Generator__IntervalSeconds=30
      - Generator__MinItems=10
      - Generator__MaxItems=20
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  service3:
    build:
      context: ./Service3.Proxy
      dockerfile: Dockerfile
    container_name: service3
    ports:
      - "5003:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Service1__BaseUrl=http://service1:8080
      - Redis__ConnectionString=redis:6379
    depends_on:
      service1:
        condition: service_started
      redis:
        condition: service_healthy
    restart: on-failure

  service2:
    build:
      context: ./service2
      dockerfile: Dockerfile
    container_name: service2
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=consumer_db;Username=postgres;Password=postgres
      - Consumer__Service3Url=http://service3:8080
      - Consumer__ExcelOutputDirectory=/data/excel
      - RabbitMQ__Host=rabbitmq
    volumes:
      - excel_data:/data/excel
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      service3:
        condition: service_started
    restart: on-failure

volumes:
  postgres_data:
  excel_data: